services:
  apex:
    build:
      context: .
      dockerfile: Dockerfile.apex
    ports:
      - "5020:5020"
      - "5001:5001"
      - "5002:5002"
      - "5004:5004"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',5020),2); s.close()"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
